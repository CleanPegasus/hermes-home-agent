<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #121212;
      --muted: #5f6368;
      --line: #d8dadd;
      --panel: #f7f8f8;
      --accent: #0f766e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #ffffff;
    }

    main {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 28px 18px 36px;
    }

    header {
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    section {
      padding: 16px 0;
      border-bottom: 1px solid var(--line);
    }

    ul, ol {
      margin: 0;
      padding-left: 1.2rem;
    }

    li {
      margin: 6px 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding-top: 18px;
    }

    button {
      appearance: none;
      border: 1px solid var(--accent);
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      font: inherit;
      min-height: 40px;
      padding: 8px 12px;
      cursor: pointer;
    }

    button.secondary {
      background: #ffffff;
      color: var(--accent);
    }

    .quiet {
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>{{title}}</h1>
      <p>{{summary}}</p>
    </header>

    <section>
      <h2>{{section_title}}</h2>
      <p>{{section_body}}</p>
    </section>

    <section class="actions" aria-label="actions">
      {{actions}}
    </section>
  </main>
</body>
</html>
