services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hermes_home}
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes} -d ${POSTGRES_DB:-hermes_home}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  vikunja-postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${VIKUNJA_POSTGRES_DB:-vikunja}
      POSTGRES_USER: ${VIKUNJA_POSTGRES_USER:-vikunja}
      POSTGRES_PASSWORD: ${VIKUNJA_POSTGRES_PASSWORD:?VIKUNJA_POSTGRES_PASSWORD is required}
    volumes:
      - vikunja-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${VIKUNJA_POSTGRES_USER:-vikunja}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  vikunja:
    image: vikunja/vikunja:${VIKUNJA_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_SERVICE_PUBLICURL:-http://vikunja:3456/}
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_SERVICE_SECRET:?VIKUNJA_SERVICE_SECRET is required}
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: vikunja-postgres
      VIKUNJA_DATABASE_USER: ${VIKUNJA_POSTGRES_USER:-vikunja}
      VIKUNJA_DATABASE_PASSWORD: ${VIKUNJA_POSTGRES_PASSWORD:?VIKUNJA_POSTGRES_PASSWORD is required}
      VIKUNJA_DATABASE_DATABASE: ${VIKUNJA_POSTGRES_DB:-vikunja}
    volumes:
      - vikunja-files:/app/vikunja/files
    ports:
      - "127.0.0.1:${VIKUNJA_PORT:-3456}:3456"
    depends_on:
      vikunja-postgres:
        condition: service_healthy

  webapp:
    build:
      context: ..
      dockerfile: web/Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
    restart: unless-stopped
    environment:
      HOME_API_TOKEN: ${HOME_API_TOKEN:?HOME_API_TOKEN is required}
      NGINX_BASIC_AUTH_REALM: ${NGINX_BASIC_AUTH_REALM:-Hermes Home}
      APP_UPSTREAM: ${APP_UPSTREAM:-host.docker.internal:8000}
    ports:
      - "${HTTP_PORT:-80}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${NGINX_HTPASSWD_HOST_PATH:-./nginx/.htpasswd}:/etc/nginx/auth/.htpasswd:ro
    depends_on:
      webapp:
        condition: service_healthy

volumes:
  postgres-data:
  vikunja-postgres-data:
  vikunja-files:
