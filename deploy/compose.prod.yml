services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hermes_home}
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes} -d ${POSTGRES_DB:-hermes_home}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  vikunja-postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${VIKUNJA_POSTGRES_DB:-vikunja}
      POSTGRES_USER: ${VIKUNJA_POSTGRES_USER:-vikunja}
      POSTGRES_PASSWORD: ${VIKUNJA_POSTGRES_PASSWORD:?VIKUNJA_POSTGRES_PASSWORD is required}
    volumes:
      - vikunja-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${VIKUNJA_POSTGRES_USER:-vikunja}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  vikunja:
    image: vikunja/vikunja:${VIKUNJA_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_SERVICE_PUBLICURL:-http://vikunja:3456/}
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_SERVICE_SECRET:?VIKUNJA_SERVICE_SECRET is required}
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: vikunja-postgres
      VIKUNJA_DATABASE_USER: ${VIKUNJA_POSTGRES_USER:-vikunja}
      VIKUNJA_DATABASE_PASSWORD: ${VIKUNJA_POSTGRES_PASSWORD:?VIKUNJA_POSTGRES_PASSWORD is required}
      VIKUNJA_DATABASE_DATABASE: ${VIKUNJA_POSTGRES_DB:-vikunja}
    volumes:
      - vikunja-files:/app/vikunja/files
    depends_on:
      vikunja-postgres:
        condition: service_healthy

  app:
    build:
      context: ..
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      HOME_API_TOKEN: ${HOME_API_TOKEN:?HOME_API_TOKEN is required}
      HERMES_ENV: production
      HERMES_STRICT_DEPLOYMENT_CHECKS: ${HERMES_STRICT_DEPLOYMENT_CHECKS:-false}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hermes}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hermes_home}
      AGENT_CMD: ${AGENT_CMD:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CODEX_ENABLED: ${CODEX_ENABLED:-false}
      OBSIDIAN_VAULT_PATH: /data/obsidian-vault
      VIKUNJA_URL: ${VIKUNJA_URL:-http://vikunja:3456}
      VIKUNJA_TOKEN: ${VIKUNJA_TOKEN:-}
      VIKUNJA_TOKEN_FILE: ${VIKUNJA_TOKEN_FILE:-/run/secrets/vikunja_api_token}
      VIKUNJA_DEFAULT_PROJECT_ID: ${VIKUNJA_DEFAULT_PROJECT_ID:-}
      VIKUNJA_PROJECT_ID: ${VIKUNJA_PROJECT_ID:-}
      VIKUNJA_TIMEOUT_SECONDS: ${VIKUNJA_TIMEOUT_SECONDS:-10}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ${OBSIDIAN_VAULT_HOST_PATH:-./data/obsidian-vault}:/data/obsidian-vault
      - ${VIKUNJA_API_TOKEN_FILE_HOST_PATH:-./vikunja/api-token}:/run/secrets/vikunja_api_token:ro
    depends_on:
      postgres:
        condition: service_healthy
      vikunja:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  nginx:
    build:
      context: ..
      dockerfile: web/Dockerfile
    restart: unless-stopped
    environment:
      HOME_API_TOKEN: ${HOME_API_TOKEN:?HOME_API_TOKEN is required}
      NGINX_BASIC_AUTH_REALM: ${NGINX_BASIC_AUTH_REALM:-Hermes Home}
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ${NGINX_HTPASSWD_HOST_PATH:-./nginx/.htpasswd}:/etc/nginx/auth/.htpasswd:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres-data:
  vikunja-postgres-data:
  vikunja-files:
